scientific_schema_version: 3
model_architecture_version: nanogpt_separate_qkv_tied_head_v2
parameter_count_convention: total
base_optimizer: adamw
extensions:
- none
- wwpgd
dataset_name: HuggingFaceFW/fineweb-edu
dataset_config: sample-10BT
dataset_subset: sample-10BT
dataset_split: train
data_mode: fineweb_custom_bpe_scaling
dataset_revision: 593b3a867298afb8ce42625a270ef20ddcad28f9
composite_spectral_analysis_enabled: false
model:
  vocab_size: 8192
  dropout: 0.0
  bias: false
  tie_weights: true
  linear_bias: false
  layernorm_bias: true
  init_mode: nanogpt_normal_0p02
  profile_name: scaling_level0
  mlp_mult: 4
train:
  batch_size: 16
  gradient_accumulation: 1
  learning_rate: 0.0006
  betas:
  - 0.9
  - 0.95
  epsilon: 1.0e-08
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 10
  spectral_interval: 10
  checkpoint_interval: 50
  eval_batches: 20
  training_sampling: random_window
  lr_schedule: warmup_cosine
  warmup_ratio: 0.01
  min_lr_ratio: 0.1
  layer_lr: flat
  llrd_min_multiplier: 0.5
  evaluation_sampling: random_per_eval
  wwpgd_interval: null
  warmup_steps: null
  lr_decay_steps: null
wwpgd:
  enabled: true
  extension: wwpgd
  target_alpha: 2.0
  strength: 1.0
  q: 1.0
  blend_eta: 0.5
  cayley_eta: 0.25
  min_tail: 5
  use_detx: true
  warmup_events: 0
  ramp_events: 0
  project_embeddings: false
  project_output_head: false
