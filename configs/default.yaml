parameter_count_convention: total
dataset_name: HuggingFaceFW/fineweb-edu
dataset_config: sample-10BT
dataset_revision: main
model:
  n_layer: 2
  n_head: 1
  n_embd: 64
  block_size: 256
  vocab_size: 8192
train:
  batch_size: 8
  gradient_accumulation: 1
  learning_rate: 0.0003
  weight_decay: 0.1
  eval_interval: 10
  spectral_interval: 10
  checkpoint_interval: 50
  eval_batches: 4
wwpgd:
  enabled: true
  target_alpha: 2.0
  strength: 0.02
  projection_schedule: [0.10, 0.20, 0.30, 0.40, 0.55, 0.70, 0.82, 0.92]
