tokenizer: gpt2
dataset_name: HuggingFaceFW/fineweb-edu
dataset_config: sample-10BT
dataset_revision: 593b3a867298afb8ce42625a270ef20ddcad28f9
data_mode: fineweb_gpt2_reproduction
model:
  n_layer: 1
  n_head: 1
  n_embd: 64
  block_size: 64
  mlp_mult: 4
  tie_weights: false
  linear_bias: false
  layernorm_bias: true
  init_mode: pytorch_default
  profile_name: historical_reproduction_level0
train:
  batch_size: 16
  gradient_accumulation: 1
  learning_rate: 0.001
  weight_decay: 0.005
  grad_clip: 0.0
  max_steps: 130000
  eval_interval: 1000
  eval_batches: 20
  training_sampling: random_window
  lr_schedule: warmup_cosine
  layer_lr: manual
  warmup_ratio: 0.03
  min_lr_ratio: 0.25
composite_spectral_analysis_enabled: false
