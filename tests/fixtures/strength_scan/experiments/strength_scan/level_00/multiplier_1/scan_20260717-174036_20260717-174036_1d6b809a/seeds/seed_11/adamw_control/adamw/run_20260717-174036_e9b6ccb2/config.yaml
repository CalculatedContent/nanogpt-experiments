dataset_config: sample-10BT
dataset_name: HuggingFaceFW/fineweb-edu
dataset_revision: main
model:
  activation: gelu
  bias: true
  block_size: 8
  dropout: 0.0
  n_embd: 16
  n_head: 1
  n_layer: 1
  tie_weights: true
  vocab_size: 128
parameter_count_convention: total
seeds:
- 1337
- 2027
- 4099
- 7919
- 104729
token_multipliers:
- 5
- 10
- 20
- 40
train:
  batch_size: 1
  betas:
  - 0.9
  - 0.95
  checkpoint_interval: 50
  epsilon: 1.0e-08
  eval_batches: 1
  eval_interval: 10
  grad_clip: 1.0
  gradient_accumulation: 1
  learning_rate: 0.0003
  max_steps: null
  spectral_interval: 10
  warmup_steps: 10
  weight_decay: 0.1
wwpgd:
  blend_eta: 0.5
  cayley_eta: 0.25
  enabled: false
  include_embeddings: false
  include_output: false
  layer_scope: blocks
  min_tail: 5
  projection_schedule:
  - 0.1
  - 0.2
  - 0.3
  - 0.4
  - 0.55
  - 0.7
  - 0.82
  - 0.92
  ramp_events: 5
  ramp_steps: 10
  strength: 0.02
  target_alpha: 2.0
  use_detx: true
  warmup_events: 0
  warmup_steps: 0
